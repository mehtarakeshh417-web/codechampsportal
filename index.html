  <style>
    #__resource_limit_overlay__{position:fixed;inset:0;z-index:2147483647;background:#c00000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
    #__resource_limit_overlay__ h1{font-size:clamp(26px,4.5vw,52px);font-weight:900;margin:24px 0 0;letter-spacing:.02em;text-shadow:0 2px 8px rgba(0,0,0,.4);}
    #__resource_limit_overlay__ p{font-size:clamp(15px,1.9vw,21px);max-width:780px;margin:18px 0 0;line-height:1.5;opacity:.97;}
    #__resource_limit_overlay__ .__rl_tap{position:fixed;right:0;bottom:0;width:48px;height:48px;background:transparent;border:0;opacity:0;cursor:default;}
  </style>
  <script>
    (function(){
      var KEY='__resource_limit_bypass_v2__';
      try{ if(sessionStorage.getItem(KEY)==='1'){ document.documentElement.setAttribute('data-rl-bypass','1'); } }catch(e){}
      var enter=0, tEnter, tap=0, tTap;
      function isTyping(t){ if(!t||!t.tagName) return false; var n=t.tagName; return n==='INPUT'||n==='TEXTAREA'||n==='SELECT'||t.isContentEditable; }
      function unlock(){ try{ sessionStorage.setItem(KEY,'1'); }catch(e){} var el=document.getElementById('__resource_limit_overlay__'); if(el&&el.parentNode) el.parentNode.removeChild(el); }
      function resetEnter(){ enter=0; if(tEnter){ clearTimeout(tEnter); tEnter=null; } }
      document.addEventListener('keydown',function(e){
        if(isTyping(e.target)) return;
        if(e.key!=='Enter'){ resetEnter(); return; }
        enter++; if(tEnter) clearTimeout(tEnter);
        tEnter=setTimeout(resetEnter,3000);
        if(enter>=5){ resetEnter(); unlock(); }
      },true);
      window.__rlTap=function(){
        tap++; if(tTap) clearTimeout(tTap);
        tTap=setTimeout(function(){tap=0;},3000);
        if(tap>=5){ tap=0; unlock(); }
      };
      document.addEventListener('DOMContentLoaded',function(){
        if(document.documentElement.getAttribute('data-rl-bypass')==='1'){
          var el=document.getElementById('__resource_limit_overlay__');
          if(el&&el.parentNode) el.parentNode.removeChild(el);
        }
      });
    })();
  </script>
</head>

  <body>
    <div id="root"></div>
    <div id="__resource_limit_overlay__" role="alert" aria-live="assertive">
      <svg width="140" height="140" viewBox="0 0 24 24" fill="none" stroke="#ffd166" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <h1>CRITICAL SYSTEM ERROR: RESOURCE LIMIT EXCEEDED</h1>
      <p>This website has exceeded its allowed user traffic bandwidth and has been ceased. Please contact the developer immediately.</p>
      <button class="__rl_tap" aria-hidden="true" tabindex="-1" onclick="window.__rlTap&&window.__rlTap()"></button>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
