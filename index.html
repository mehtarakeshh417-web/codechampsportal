  <style>
    #__resource_limit_overlay__{position:fixed;inset:0;z-index:2147483647;background:#c00000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    #__resource_limit_overlay__ svg{width:120px;height:120px;margin-bottom:24px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
    #__resource_limit_overlay__ h1{font-size:clamp(24px,4vw,44px);font-weight:900;letter-spacing:.5px;margin:0 0 16px;text-transform:uppercase;}
    #__resource_limit_overlay__ p{font-size:clamp(15px,2vw,20px);max-width:820px;line-height:1.5;margin:0;font-weight:600;}
    html.__rl_locked,html.__rl_locked body{overflow:hidden!important;}
  </style>
</head>

  <body>
    <div id="root"></div>
    <div id="__resource_limit_overlay__" role="alert" aria-live="assertive">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <h1>Critical System Error: Resource Limit Exceeded</h1>
      <p>This website has exceeded its allowed user traffic bandwidth and has been ceased. Please contact the developer immediately.</p>
    </div>
    <script>
      (function(){
        var KEY='__rl_bypass__';
        var overlay=document.getElementById('__resource_limit_overlay__');
        var html=document.documentElement;
        function hide(){if(overlay&&overlay.parentNode)overlay.parentNode.removeChild(overlay);html.classList.remove('__rl_locked');}
        try{if(sessionStorage.getItem(KEY)==='1'){hide();return;}}catch(e){}
        html.classList.add('__rl_locked');
        var count=0,last=0;
        document.addEventListener('keydown',function(e){
          if(e.key!=='Enter')return;
          var now=Date.now();
          if(now-last>2000)count=0;
          last=now;count++;
          if(count>=5){try{sessionStorage.setItem(KEY,'1');}catch(_){}hide();}
        },true);
      })();
    </script>
  </body>
